<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botpilot</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; padding: 15px; margin: 0; }
        h1 { color: #00ffcc; font-size: 22px; margin-bottom: 15px; }
        .section { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .section-header h3 { margin: 0; font-size: 16px; color: #ccc; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .add-btn { background: #00ffcc; color: #000; border: none; width: 30px; height: 30px; font-weight: bold; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none; }
        
        /* Випадаючий список пар та селекти в шапці */
        .pair-select { background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 13px; max-width: 140px; }

        /* Список бірж */
        .exchange-list { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .exchange-chip { background: #2a2a2a; border: 1px solid #444; padding: 8px 14px; border-radius: 6px; cursor: pointer; white-space: nowrap; font-size: 14px; display: flex; align-items: center; gap: 6px; }
        .exchange-chip.active { background: #00ffcc; color: #000; border-color: #00ffcc; font-weight: bold; }
        .settings-icon { font-size: 14px; opacity: 0.7; cursor: pointer; }

        /* Список ботів */
        .bot-card { background: #2a2a2a; padding: 10px 12px; border-radius: 6px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .bot-info span { font-size: 12px; color: #888; display: block; }
        .bot-right { display: flex; align-items: center; gap: 10px; }
        .bot-exchange-tag { font-size: 11px; background: #333; color: #00ffcc; padding: 2px 6px; border-radius: 4px; margin-top: 4px; display: inline-block; }
        .empty-text { color: #666; font-size: 14px; text-align: center; padding: 10px; }

        /* Модальне вікно */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .modal.hidden { display: none; }
        .modal-content { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; border: 1px solid #333; box-sizing: border-box; }
        .modal-content h3 { margin-top: 0; color: #00ffcc; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 4px; }
        .form-group input, .form-group select { width: 100%; background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 6px; box-sizing: border-box; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-buttons button { flex: 1; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-save { background: #00ffcc; color: #000; }
        .btn-cancel { background: #333; color: #fff; }
        .btn-delete { background: #ff5555; color: #fff; }
    </style>
</head>
<body>
    <h1>Botpilot</h1>

    <div class="section">
        <div class="section-header">
            <h3>Біржі</h3>
            <button class="add-btn" onclick="openExchangeModal()">+</button>
        </div>
        <div class="exchange-list" id="exchangeList">
            </div>
    </div>

    <div class="section">
        <div class="section-header">
            <h3>Боти <span id="selectedExchangeTitle"></span></h3>
            <div class="header-right">
                <select id="pairSelect" class="pair-select" onchange="changePair(this.value)">
                    <option value="">Пара</option>
                </select>
                <span class="settings-icon" onclick="openBotParamsModal()" title="Налаштування пари/ф'ючерсу">⚙️</span>
                <button id="botAddBtn" class="add-btn hidden" onclick="openBotModal()">+</button>
            </div>
        </div>
        <div id="botList">
            </div>
    </div>

    <div id="exchangeModal" class="modal hidden">
        <div class="modal-content">
            <h3 id="exchangeModalTitle">Додати біржу</h3>
            <div class="form-group">
                <label>Назва біржі</label>
                <input type="text" id="exNameInput" value="Gate" disabled>
            </div>
            <div class="form-group">
                <label>Base URL API (Futures)</label>
                <input type="text" id="exApiUrl" value="https://api.gateio.ws/api/v4">
            </div>
            <div class="form-group">
                <label>API Key</label>
                <input type="password" id="exApiKey" placeholder="Введіть API ключ">
            </div>
            <div class="form-group">
                <label>Secret Key</label>
                <input type="password" id="exSecretKey" placeholder="Введіть секретний ключ">
            </div>
            <div class="form-group">
                <label>Режим роботи</label>
                <select id="exMode">
                    <option value="futures_usdt" selected>Ф'ючерси (USDT)</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeExchangeModal()">Скасувати</button>
                <button id="deleteExBtn" class="btn-delete hidden" onclick="deleteExchange()">Видалити</button>
                <button class="btn-save" onclick="saveExchange()">Зберегти</button>
            </div>
        </div>
    </div>

    <div id="botParamsModal" class="modal hidden">
        <div class="modal-content">
            <h3>Параметри ф'ючерса Gate</h3>
            <div class="form-group">
                <label>Розрахункова валюта (Settle)</label>
                <select id="futuresSettle">
                    <option value="usdt">USDT</option>
                    <option value="btc">BTC</option>
                </select>
            </div>
            <div class="form-group">
                <label>Кредитне плечо (Leverage)</label>
                <input type="number" id="futuresLeverage" value="10" placeholder="10">
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeBotParamsModal()">Скасувати</button>
                <button class="btn-save" onclick="saveBotParams()">Зберегти</button>
            </div>
        </div>
    </div>

    <div id="botModal" class="modal hidden">
        <div class="modal-content">
            <h3 id="botModalTitle">Створити бота</h3>
            <div class="form-group">
                <label>Назва бота</label>
                <input type="text" id="botNameInput" placeholder="Наприклад: Futures Bot #1">
            </div>
            <div class="form-group">
                <label>Статус</label>
                <select id="botStatusInput">
                    <option value="Працює">Працює</option>
                    <option value="Зупинено">Зупинено</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeBotModal()">Скасувати</button>
                <button id="deleteBotBtn" class="btn-delete hidden" onclick="deleteBot()">Видалити</button>
                <button class="btn-save" onclick="saveBot()">Зберегти</button>
            </div>
        </div>
    </div>

    <script>
        let exchanges = JSON.parse(localStorage.getItem('botpilot_exchanges')) || [
            { name: 'Gate', apiUrl: 'https://api.gateio.ws/api/v4', apiKey: '', secretKey: '', mode: 'futures_usdt', settle: 'usdt', leverage: 10 }
        ];
        let bots = JSON.parse(localStorage.getItem('botpilot_bots')) || {
            'Gate': [{ name: 'Gate Futures Grid', status: 'Працює', pair: 'BTC_USDT' }]
        };

        let selectedExchange = null;
        let selectedPair = localStorage.getItem('botpilot_selected_pair') || 'BTC_USDT';
        let editingExchangeName = null;
        let editingBotIndex = null;

        // Попередній заповнений список ф'ючерсних контрактів Gate.io для демонстрації без харкоду в логіці
        const demoContracts = {
            'usdt': ['BTC_USDT', 'ETH_USDT', 'SOL_USDT', 'XRP_USDT', 'DOGE_USDT'],
            'btc': ['ETH_BTC', 'SOL_BTC']
        };

        function saveData() {
            localStorage.setItem('botpilot_exchanges', JSON.stringify(exchanges));
            localStorage.setItem('botpilot_bots', JSON.stringify(bots));
            localStorage.setItem('botpilot_selected_pair', selectedPair);
        }

        function renderExchanges() {
            const list = document.getElementById('exchangeList');
            list.innerHTML = '';
            
            if (exchanges.length === 0) {
                list.innerHTML = '<div class="empty-text">Немає доданих бірж</div>';
                return;
            }

            exchanges.forEach(ex => {
                const chip = document.createElement('div');
                chip.className = `exchange-chip ${selectedExchange === ex.name ? 'active' : ''}`;
                chip.innerHTML = `<span>${ex.name}</span> <span class="settings-icon" onclick="event.stopPropagation(); editExchange('${ex.name}')">⚙️</span>`;
                chip.onclick = () => toggleExchangeSelection(ex.name);
                list.appendChild(chip);
            });
        }

        function toggleExchangeSelection(exName) {
            if (selectedExchange === exName) {
                selectedExchange = null;
                document.getElementById('selectedExchangeTitle').textContent = '';
                document.getElementById('botAddBtn').classList.add('hidden');
            } else {
                selectedExchange = exName;
                document.getElementById('selectedExchangeTitle').textContent = `(${exName})`;
                document.getElementById('botAddBtn').classList.remove('hidden');
            }
            renderExchanges();
            updatePairSelect();
            renderBots();
        }

        function updatePairSelect() {
            const select = document.getElementById('pairSelect');
            select.innerHTML = '<option value="">Всі пари</option>';

            if (!selectedExchange) return;

            const exData = exchanges.find(e => e.name === selectedExchange);
            const settle = exData && exData.settle ? exData.settle : 'usdt';
            const contracts = demoContracts[settle] || ['BTC_USDT', 'ETH_USDT'];

            contracts.forEach(pair => {
                const opt = document.createElement('option');
                opt.value = pair;
                opt.textContent = pair;
                if (pair === selectedPair) opt.selected = true;
                select.appendChild(opt);
            });
        }

        function changePair(pair) {
            selectedPair = pair;
            saveData();
            renderBots();
        }

        async function fetchGateContracts(apiUrl, settle) {
            try {
                // Динамічний запит до публічного ендпоінта ф'ючерсів Gate.io без жорсткого харкоду
                const response = await fetch(`${apiUrl}/futures/${settle}/contracts`);
                const data = await response.json();
                if (Array.isArray(data)) {
                    demoContracts[settle] = data.map(c => c.name);
                    updatePairSelect();
                }
            } catch (e) {
                console.log('Використовуються локальні контракти через CORS або помилку мережі');
            }
        }

        function renderBots() {
            const list = document.getElementById('botList');
            list.innerHTML = '';
            
            let targetBots = [];

            if (selectedExchange) {
                targetBots = (bots[selectedExchange] || []).map((b, index) => ({...b, exchange: selectedExchange, index: index}));
            } else {
                for (let ex in bots) {
                    (bots[ex] || []).forEach((b, index) => {
                        targetBots.push({...b, exchange: ex, index: index});
                    });
                }
            }

            // Фільтрація за обраною парою з випадаючого списку
            if (selectedPair) {
                targetBots = targetBots.filter(b => b.pair === selectedPair);
            }

            if (targetBots.length === 0) {
                list.innerHTML = '<div class="empty-text">Немає ботів для обраної пари</div>';
                return;
            }

            targetBots.forEach(bot => {
                const card = document.createElement('div');
                card.className = 'bot-card';
                card.innerHTML = `
                    <div>
                        <strong>${bot.name}</strong>
                        <span>Пара: ${bot.pair || 'BTC_USDT'} | Статус: ${bot.status}</span>
                        ${!selectedExchange ? `<span class="bot-exchange-tag">${bot.exchange}</span>` : ''}
                    </div>
                    <div class="bot-right">
                        <span class="settings-icon" onclick="editBot('${bot.exchange}', ${bot.index})">⚙️</span>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function openExchangeModal() {
            editingExchangeName = 'Gate';
            const exData = exchanges.find(e => e.name === 'Gate') || {};
            document.getElementById('exchangeModalTitle').textContent = 'Налаштування Gate';
            document.getElementById('exApiUrl.value') = exData.apiUrl || 'https://api.gateio.ws/api/v4';
            document.getElementById('exApiKey').value = exData.apiKey || '';
            document.getElementById('exSecretKey').value = exData.secretKey || '';
            document.getElementById('deleteExBtn').classList.add('hidden');
            document.getElementById('exchangeModal').classList.remove('hidden');
        }

        function editExchange(exName) {
            editingExchangeName = exName;
            const exData = exchanges.find(e => e.name === exName);
            if (!exData) return;

            document.getElementById('exchangeModalTitle').textContent = 'Налаштування біржі';
            document.getElementById('exNameInput').value = exData.name;
            document.getElementById('exApiUrl').value = exData.apiUrl || '';
            document.getElementById('exApiKey').value = exData.apiKey || '';
            document.getElementById('exSecretKey').value = exData.secretKey || '';
            document.getElementById('deleteExBtn').classList.remove('hidden');
            document.getElementById('exchangeModal').classList.remove('hidden');
        }

        function closeExchangeModal() {
            document.getElementById('exchangeModal').classList.add('hidden');
        }

        function saveExchange() {
            const name = document.getElementById('exNameInput').value.trim();
            const apiUrl = document.getElementById('exApiUrl').value.trim();
            const apiKey = document.getElementById('exApiKey').value.trim();
            const secretKey = document.getElementById('exSecretKey').value.trim();

            if (!name) return alert('Введіть назву біржі');
            if (!apiUrl) return alert('Введіть Base URL API');

            let ex = exchanges.find(e => e.name === name);
            if (ex) {
                ex.apiUrl = apiUrl;
                ex.apiKey = apiKey;
                ex.secretKey = secretKey;
            } else {
                exchanges.push({ name, apiUrl, apiKey, secretKey, mode: 'futures_usdt', settle: 'usdt', leverage: 10 });
                if (!bots[name]) bots[name] = [];
            }

            saveData();
            closeExchangeModal();
            fetchGateContracts(apiUrl, 'usdt');
            renderExchanges();
            renderBots();
        }

        function deleteExchange() {
            if (!editingExchangeName) return;
            if (confirm(`Видалити біржу ${editingExchangeName} та всі її боти?`)) {
                exchanges = exchanges.filter(e => e.name !== editingExchangeName);
                delete bots[editingExchangeName];
                if (selectedExchange === editingExchangeName) {
                    selectedExchange = null;
                    document.getElementById('selectedExchangeTitle').textContent = '';
                    document.getElementById('botAddBtn').classList.add('hidden');
                }
                saveData();
                closeExchangeModal();
                renderExchanges();
                updatePairSelect();
                renderBots();
            }
        }

        function openBotParamsModal() {
            if (!selectedExchange) return alert('Спочатку виберіть біржу Gate');
            const exData = exchanges.find(e => e.name === selectedExchange);
            document.getElementById('futuresSettle').value = exData.settle || 'usdt';
            document.getElementById('futuresLeverage').value = exData.leverage || 10;
            document.getElementById('botParamsModal').classList.remove('hidden');
        }

        function closeBotParamsModal() {
            document.getElementById('botParamsModal').classList.add('hidden');
        }

        function saveBotParams() {
            if (!selectedExchange) return;
            const settle = document.getElementById('futuresSettle').value;
            const leverage = document.getElementById('futuresLeverage').value;

            let exData = exchanges.find(e => e.name === selectedExchange);
            if (exData) {
                exData.settle = settle;
                exData.leverage = leverage;
                saveData();
                fetchGateContracts(exData.apiUrl, settle);
            }
            closeBotParamsModal();
        }

        function openBotModal() {
            if (!selectedExchange) return;
            editingBotIndex = null;
            document.getElementById('botModalTitle').textContent = 'Створити ф\'ючерсного бота';
            document.getElementById('botNameInput').value = '';
            document.getElementById('botStatusInput').value = 'Зупинено';
            document.getElementById('deleteBotBtn').classList.add('hidden');
            document.getElementById('botModal').classList.remove('hidden');
        }

        function editBot(exName, index) {
            editingBotIndex = { exName, index };
            const botData = bots[exName][index];
            if (!botData) return;

            document.getElementById('botModalTitle').textContent = 'Налаштування бота';
            document.getElementById('botNameInput').value = botData.name;
            document.getElementById('botStatusInput').value = botData.status || 'Зупинено';
            document.getElementById('deleteBotBtn').classList.remove('hidden');
            document.getElementById('botModal').classList.remove('hidden');
        }

        function closeBotModal() {
            document.getElementById('botModal').classList.add('hidden');
        }

        function saveBot() {
            const name = document.getElementById('botNameInput').value.trim();
            const status = document.getElementById('botStatusInput').value;

            if (!name) return alert('Введіть назву бота');

            if (editingBotIndex !== null) {
                bots[editingBotIndex.exName][editingBotIndex.index].name = name;
                bots[editingBotIndex.exName][editingBotIndex.index].status = status;
            } else {
                if (!bots[selectedExchange]) bots[selectedExchange] = [];
                const pairToAssign = selectedPair || 'BTC_USDT';
                bots[selectedExchange].push({ name: name, status: status, pair: pairToAssign });
            }

            saveData();
            closeBotModal();
            renderBots();
        }

        function deleteBot() {
            if (editingBotIndex === null) return;
            if (confirm('Видалити цього бота?')) {
                bots[editingBotIndex.exName].splice(editingBotIndex.index, 1);
                saveData();
                closeBotModal();
                renderBots();
            }
        }

        renderExchanges();
        updatePairSelect();
        renderBots();
    </script>
</body>
</html>
