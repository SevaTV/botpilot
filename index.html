<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botpilot</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="top-header">
        <h1>Botpilot</h1>
        <div class="top-controls">
            <div id="pairDisplay" class="pair-display">--</div>
            <div id="priceDisplay" class="price-display">--</div>
            <span class="gear-btn" onclick="openPairConfigModal()" title="Налаштування URL пари">⚙️</span>
        </div>
    </div>

    <div class="section">
        <div class="section-header">
            <h3>Біржі</h3>
            <button class="add-btn" onclick="openExchangeModal()">+</button>
        </div>
        <div class="exchange-list" id="exchangeList"></div>
    </div>

    <div class="section">
        <div class="section-header">
            <h3>Боти <span id="exchangeLabel"></span></h3>
            <button id="botAddBtn" class="add-btn hidden" onclick="openBotModal()">+</button>
        </div>
        <div id="botList"></div>
    </div>

    <div class="section">
        <div class="section-header">
            <h3>Ф'ючерси <span id="futuresExchangeLabel"></span></h3>
            <select id="contractSelect" class="contract-select" onchange="onContractChange()">
                <option value="" selected disabled>Контракт</option>
                <option value="BTC_USDT">BTC/USDT</option>
                <option value="XAG_USDT">XAG/USDT</option>
            </select>
        </div>
        
        <div class="futures-tabs">
            <button class="tab-btn active" onclick="switchFuturesTab('positions')" id="tabPos">Позиції</button>
            <button class="tab-btn" onclick="switchFuturesTab('orders')" id="tabOrd">Ордери</button>
            <button class="tab-btn" onclick="switchFuturesTab('history')" id="tabHist">Історія</button>
        </div>

        <div id="futuresContent"></div>
    </div>

    <div class="app-version">v1.2.4</div>

    <div id="pairConfigModal" class="modal hidden">
        <div class="modal-content">
            <h3>Повний шлях до API пар</h3>
            <div class="form-group">
                <label>Повний URL запиту</label>
                <input type="text" id="apiFullUrlInput" placeholder="https://api.gateio.ws/api/v4/futures/usdt/contracts/XAG_USDT">
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closePairConfigModal()">Закрити</button>
                <button class="btn-save" onclick="fetchPairPrice()">Оновити</button>
            </div>
        </div>
    </div>

    <div id="exchangeModal" class="modal hidden">
        <div class="modal-content">
            <h3 id="exModalTitle">Додати біржу</h3>
            <div class="form-group">
                <label>Назва біржі</label>
                <input type="text" id="exName" placeholder="Gate">
            </div>
            <div class="form-group">
                <label>Base URL API</label>
                <input type="text" id="exUrl" placeholder="https://api.gateio.ws/api/v4">
            </div>
            <div class="form-group">
                <label>API Key</label>
                <input type="password" id="exKey">
            </div>
            <div class="form-group">
                <label>Secret Key</label>
                <input type="password" id="exSecret">
            </div>
            
            <div id="debugContainer" class="hidden">
                <label style="font-size: 11px; color: #aaa; margin-top: 10px; display: block;">Результат запиту / Лог:</label>
                <div id="exDebugLog" class="debug-box"></div>
            </div>

            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeExchangeModal()">Скасувати</button>
                <button id="exDelBtn" class="btn-delete hidden" onclick="deleteExchange()">Видалити</button>
                <button class="btn-save" onclick="saveExchange()">Зберегти</button>
            </div>
        </div>
    </div>

    <div id="botModal" class="modal hidden">
        <div class="modal-content">
            <h3 id="botModalTitle">Новий бот</h3>
            <div class="form-group">
                <label>Назва бота</label>
                <input type="text" id="botName" placeholder="Grid Bot #1">
            </div>
            <div class="form-group">
                <label>Статус</label>
                <select id="botStatus">
                    <option value="Працює">Працює</option>
                    <option value="Зупинено">Зупинено</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeBotModal()">Скасувати</button>
                <button id="botDelBtn" class="btn-delete hidden" onclick="deleteBot()">Видалити</button>
                <button class="btn-save" onclick="saveBot()">Зберегти</button>
            </div>
        </div>
    </div>

    <script>
        let exchanges = JSON.parse(localStorage.getItem('bp_ex')) || [];
        let bots = JSON.parse(localStorage.getItem('bp_bots')) || {};
        let activeEx = null;
        let selectedContract = localStorage.getItem('bp_selected_contract') || "";
        let activeFuturesTab = localStorage.getItem('bp_futures_tab') || "positions";
        let lastPriceValue = localStorage.getItem('bp_last_price') || "--";
        let fullApiUrl = localStorage.getItem('bp_full_url') || "https://api.gateio.ws/api/v4/futures/usdt/contracts/XAG_USDT";
        let editExIdx = null;
        let editBotIdx = null;

        document.getElementById('apiFullUrlInput').value = fullApiUrl;
        document.getElementById('priceDisplay').textContent = lastPriceValue;
        document.getElementById('contractSelect').value = selectedContract;
        updatePairDisplay(fullApiUrl);

        function updatePairDisplay(url) {
            try {
                const parts = url.split('/');
                const pair = parts[parts.length - 1] || "---";
                document.getElementById('pairDisplay').textContent = pair.replace('_', '/');
            } catch (e) {
                document.getElementById('pairDisplay').textContent = "---";
            }
        }

        function switchFuturesTab(tabName) {
            activeFuturesTab = tabName;
            localStorage.setItem('bp_futures_tab', activeFuturesTab);
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (tabName === 'positions') document.getElementById('tabPos').classList.add('active');
            if (tabName === 'orders') document.getElementById('tabOrd').classList.add('active');
            if (tabName === 'history') document.getElementById('tabHist').classList.add('active');
            
            updateUI();
        }

        function onContractChange() {
            selectedContract = document.getElementById('contractSelect').value;
            localStorage.setItem('bp_selected_contract', selectedContract);
            
            if (activeEx) {
                const exObj = exchanges.find(e => e.name === activeEx);
                if (exObj && exObj.url && exObj.key && exObj.secret) {
                    const exIdx = exchanges.indexOf(exObj);
                    fetchExchangeData(exObj.url, exObj.key, exObj.secret, exIdx);
                }
            }
            updateUI();
        }

        function updateUI() {
            localStorage.setItem('bp_ex', JSON.stringify(exchanges));
            localStorage.setItem('bp_bots', JSON.stringify(bots));
            localStorage.setItem('bp_last_price', lastPriceValue);
            localStorage.setItem('bp_full_url', fullApiUrl);
            localStorage.setItem('bp_selected_contract', selectedContract);
            localStorage.setItem('bp_futures_tab', activeFuturesTab);

            document.getElementById('priceDisplay').textContent = lastPriceValue;
            updatePairDisplay(fullApiUrl);

            const exList = document.getElementById('exchangeList');
            exList.innerHTML = exchanges.length ? '' : '<div class="empty-text">Немає доданих біржах</div>';
            exchanges.forEach((ex, i) => {
                const div = document.createElement('div');
                div.className = `exchange-chip ${activeEx === ex.name ? 'active' : ''}`;
                
                const hasBalance = ex.balance !== undefined && ex.balance !== null && ex.balance !== "";
                const balanceText = hasBalance ? `${Number(ex.balance).toFixed(4)} USDT` : "N/A";
                const balanceClass = hasBalance ? "exchange-balance" : "exchange-balance empty";
                
                div.innerHTML = `
                    <div class="exchange-info" title="${ex.name}">${ex.name}</div>
                    <div style="display: flex; align-items: center; gap: 8px; flex-shrink: 0;">
                        <span class="${balanceClass}">${balanceText}</span>
                        <span class="settings-icon" onclick="event.stopPropagation(); openEditEx(${i})">⚙️</span>
                    </div>
                `;
                
                div.onclick = () => { 
                    activeEx = (activeEx === ex.name) ? null : ex.name; 
                    updateUI(); 
                };
                exList.appendChild(div);
            });

            document.getElementById('exchangeLabel').textContent = activeEx ? `(${activeEx})` : "";
            document.getElementById('futuresExchangeLabel').textContent = activeEx ? `(${activeEx})` : "";
            document.getElementById('botAddBtn').classList.toggle('hidden', !activeEx);
            
            // Рендер ботів
            const botList = document.getElementById('botList');
            botList.innerHTML = '';
            
            let displayList = [];
            if (activeEx) {
                let items = bots[activeEx] || [];
                items.forEach((bot, idx) => displayList.push({ bot, exName: activeEx, idx }));
            } else {
                for (let exName in bots) {
                    let items = bots[exName] || [];
                    items.forEach((bot, idx) => displayList.push({ bot, exName, idx }));
                }
            }

            if (!displayList.length) {
                botList.innerHTML = '<div class="empty-text">Боти відсутні</div>';
            } else {
                displayList.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'bot-card';
                    card.innerHTML = `
                        <div>
                            <strong>${item.bot.name}</strong>
                            <span>Біржа: ${item.exName} | Статус: ${item.bot.status}</span>
                        </div>
                        <span class="gear-btn" onclick="openEditBot('${item.exName}', ${item.idx})">⚙️</span>`;
                    botList.appendChild(card);
                });
            }

            // Рендер модуля Ф'ючерси
            const futuresContent = document.getElementById('futuresContent');
            futuresContent.innerHTML = '';

            if (!activeEx) {
                futuresContent.innerHTML = '<div class="empty-text">Виберіть біржу для перегляду ф\'ючерсів</div>';
                return;
            }

            const currentExObj = exchanges.find(e => e.name === activeEx);

            if (activeFuturesTab === 'positions') {
                if (!selectedContract) {
                    futuresContent.innerHTML = '<div class="empty-text">Виберіть контракт для перегляду позицій</div>';
                } else if (!currentExObj || !currentExObj.positions || currentExObj.positions.length === 0) {
                    let errLog = currentExObj && currentExObj.lastPositionsError ? currentExObj.lastPositionsError : "Активні позиції відсутні";
                    let urlLog = currentExObj && currentExObj.lastPositionsUrl ? `<br><span style="font-size: 10px; color: #ff8888;">URL: ${currentExObj.lastPositionsUrl}</span>` : "";
                    futuresContent.innerHTML = `<div class="debug-box" style="margin: 0; border-color: #444; color: #aaa;">[ПОЗИЦІЇ] ${errLog}${urlLog}</div>`;
                } else {
                    currentExObj.positions.forEach(pos => {
                        const card = document.createElement('div');
                        card.className = 'pos-styled';
                        const isLong = Number(pos.size) > 0;
                        const pnl = pos.unrealised_pnl || pos.pnl || '0.00';
                        const pnlColor = Number(pnl) >= 0 ? 'color: #22c55e;' : 'color: #ef4444;';
                        
                        const entryPrice = pos.entry_price ? Number(pos.entry_price).toFixed(2) : "--";
                        const markPrice = pos.mark_price ? Number(pos.mark_price).toFixed(2) : "--";
                        const liqPrice = pos.liq_price ? Number(pos.liq_price).toFixed(2) : "--";
                        const leverage = pos.leverage ? `${pos.leverage}x` : "15x";
                        const margin = pos.margin ? Number(pos.margin).toFixed(2) : "2.44";
                        const size = pos.size ? Math.abs(Number(pos.size)).toFixed(2) : "36.18";

                        card.innerHTML = `
                            <div class="pos-header">
                                <div class="pos-header-left">
                                    <strong>${pos.contract || selectedContract}</strong>
                                    <span class="${isLong ? 'badge-long' : 'badge-short'}">${isLong ? 'Лонг' : 'Шорт'}</span>
                                    <span style="font-size: 12px; color: #aaa;">Крос</span>
                                    <span class="pos-leverage">${leverage}</span>
                                </div>
                                <div style="font-size: 11px; color: #888;">ROI <span style="color: #22c55e; font-weight: bold;">+20,70%</span></div>
                            </div>
                            
                            <div class="pos-stats-grid">
                                <div class="pos-stat-box">
                                    <div class="pos-stat-label">Нереалізований PnL (USDT)</div>
                                    <div class="pos-stat-value big" style="${pnlColor}">${Number(pnl).toFixed(2)} <span style="font-size: 11px; font-weight: normal; color: #888;">≈$${Number(pnl).toFixed(2)}</span></div>
                                </div>
                                <div class="pos-stat-box pos-stat-right">
                                    <div class="pos-stat-label">Розмір (USDT)</div>
                                    <div class="pos-stat-value">${size}</div>
                                </div>
                                
                                <div class="pos-stat-box">
                                    <div class="pos-stat-label">Маржа (USDT)</div>
                                    <div class="pos-stat-value">${margin}</div>
                                </div>
                                <div class="pos-stat-box pos-stat-right">
                                    <div class="pos-stat-label">Ціна входу</div>
                                    <div class="pos-stat-value">${entryPrice}</div>
                                </div>

                                <div class="pos-stat-box">
                                    <div class="pos-stat-label">Ціна маркування</div>
                                    <div class="pos-stat-value">${markPrice}</div>
                                </div>
                                <div class="pos-stat-box pos-stat-right">
                                    <div class="pos-stat-label">Прибл. лікв. ціна</div>
                                    <div class="pos-stat-value" style="color: #f59e0b;">${liqPrice}</div>
                                </div>
                            </div>

                            <div class="pos-actions">
                                <button class="btn-cancel" onclick="openTpSlModal('${pos.contract}')">ТП/СЛ</button>
                                <button class="btn-save" onclick="closePosition('${pos.contract}')">Закрити</button>
                            </div>
                        `;
                        futuresContent.appendChild(card);
                    });
                }
            } else if (activeFuturesTab === 'orders') {
                if (!selectedContract) {
                    futuresContent.innerHTML = '<div class="empty-text">Виберіть контракт для завантаження ордерів</div>';
                } else if (!currentExObj || !currentExObj.orders || currentExObj.orders.length === 0) {
                    let errLog = currentExObj && currentExObj.lastOrdersError ? currentExObj.lastOrdersError : "Поточні ордери відсутні";
                    let urlLog = currentExObj && currentExObj.lastOrdersUrl ? `<br><span style="font-size: 10px; color: #ff8888;">URL: ${currentExObj.lastOrdersUrl}</span>` : "";
                    futuresContent.innerHTML = `<div class="debug-box" style="margin: 0; border-color: #444; color: #aaa;">[ОРДЕРИ] ${errLog}${urlLog}</div>`;
                } else {
                    let htmlHeader = `
                        <div class="futures-actions-bar">
                            <span style="font-size: 12px; color: #888;">Всього: ${currentExObj.orders.length}</span>
                            <button class="btn-danger-small" onclick="cancelAllOrders()">Скасувати всі</button>
                        </div>`;
                    let ordersHtml = '';
                    currentExObj.orders.forEach((order, idx) => {
                        const contract = order.contract || selectedContract;
                        const price = order.price || "---";
                        const size = order.size || "---";
                        const text = order.text || order.id || "Без ID";

                        ordersHtml += `
                            <div class="futures-card">
                                <div>
                                    <strong>${contract}</strong>
                                    <span>Ціна: ${price} | Кількість: ${size} | ID: ${text}</span>
                                </div>
                                <button class="btn-danger-small" onclick="cancelSingleOrder('${order.id}')">Скасувати</button>
                            </div>`;
                    });
                    futuresContent.innerHTML = htmlHeader + ordersHtml;
                }
            } else if (activeFuturesTab === 'history') {
                if (!currentExObj || !currentExObj.history || currentExObj.history.length === 0) {
                    let errLog = currentExObj && currentExObj.lastHistoryError ? currentExObj.lastHistoryError : "Історія ордерів та угод відсутня";
                    let urlLog = currentExObj && currentExObj.lastHistoryUrl ? `<br><span style="font-size: 10px; color: #ff8888;">URL: ${currentExObj.lastHistoryUrl}</span>` : "";
                    futuresContent.innerHTML = `<div class="debug-box" style="margin: 0; border-color: #444; color: #aaa;">[ІСТОРІЯ] ${errLog}${urlLog}</div>`;
                } else {
                    currentExObj.history.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'futures-card';
                        card.innerHTML = `
                            <div>
                                <strong>${item.contract || '--'}</strong>
                                <span>Тип: ${item.type || 'Архів'} | Ціна: ${item.price || '--'} | Статус: ${item.status || 'Виконано'}</span>
                            </div>
                        `;
                        futuresContent.appendChild(card);
                    });
                }
            }
        }

        function openPairConfigModal() { document.getElementById('pairConfigModal').classList.remove('hidden'); }
        function closePairConfigModal() { document.getElementById('pairConfigModal').classList.add('hidden'); }

        async function fetchPairPrice() {
            const targetUrl = document.getElementById('apiFullUrlInput').value.trim();
            if (!targetUrl) return alert("Вкажіть URL");

            fullApiUrl = targetUrl;
            const proxyUrl = `/api/proxy?url=${encodeURIComponent(targetUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error('Помилка сервера: ' + response.status);
                const data = await response.json();
                
                if (data && data.last_price) {
                    lastPriceValue = data.last_price;
                    alert("Ціну успішно оновлено!");
                    closePairConfigModal();
                    updateUI();
                } else {
                    alert("Поле last_price не знайдено у відповіді API");
                }
            } catch (err) {
                alert("Помилка запиту через власний бекенд.\nДеталі: " + err.message);
            }
        }

        async function fetchExchangeData(url, key, secret, index) {
            const debugContainer = document.getElementById('debugContainer');
            const debugLog = document.getElementById('exDebugLog');
            debugContainer.classList.remove('hidden');

            if (!key || !secret) {
                exchanges[index].balance = null;
                exchanges[index].orders = [];
                exchanges[index].positions = [];
                exchanges[index].history = [];
                debugLog.className = "debug-box";
                debugLog.textContent = "Помилка: Не вказано API Key або Secret Key.";
                updateUI();
                return;
            }
            
            const cleanUrl = url.endsWith('/') ? url.slice(0, -1) : url;
            const balanceUrl = `${cleanUrl}/futures/usdt/accounts`;
            const historyUrl = `${cleanUrl}/futures/usdt/orders?status=finished`;

            const proxyBalanceUrl = `/api/proxy-auth?url=${encodeURIComponent(balanceUrl)}&key=${encodeURIComponent(key)}&secret=${encodeURIComponent(secret)}`;
            const proxyHistoryUrl = `/api/proxy-auth?url=${encodeURIComponent(historyUrl)}&key=${encodeURIComponent(key)}&secret=${encodeURIComponent(secret)}`;

            exchanges[index].lastHistoryUrl = historyUrl;

            debugLog.className = "debug-box";
            debugLog.textContent = `[ВИКОНУЮТЬСЯ ЗАПИТИ]\nОтримання даних ф'ючерсів...`;

            try {
                let requests = [fetch(proxyBalanceUrl), fetch(proxyHistoryUrl)];
                
                if (selectedContract) {
                    const positionsUrl = `${cleanUrl}/futures/usdt/positions/${selectedContract}`;
                    const ordersUrl = `${cleanUrl}/futures/usdt/orders?status=open&contract=${selectedContract}`;
                    
                    exchanges[index].lastPositionsUrl = positionsUrl;
                    exchanges[index].lastOrdersUrl = ordersUrl;

                    const proxyPositionsUrl = `/api/proxy-auth?url=${encodeURIComponent(positionsUrl)}&key=${encodeURIComponent(key)}&secret=${encodeURIComponent(secret)}`;
                    const proxyOrdersUrl = `/api/proxy-auth?url=${encodeURIComponent(ordersUrl)}&key=${encodeURIComponent(key)}&secret=${encodeURIComponent(secret)}`;
                    
                    requests.push(fetch(proxyPositionsUrl));
                    requests.push(fetch(proxyOrdersUrl));
                }

                const responses = await Promise.all(requests);
                
                const balRaw = await responses[0].text();
                const histRaw = await responses[1].text();

                let balData, histData;
                try { balData = JSON.parse(balRaw); } catch(e) { balData = {}; }
                try { histData = JSON.parse(histRaw); } catch(e) { histData = []; }

                if (balData && balData.total !== undefined) {
                    exchanges[index].balance = balData.total;
                } else if (balData && balData.available !== undefined) {
                    exchanges[index].balance = balData.available;
                } else {
                    exchanges[index].balance = null;
                }

                if (!responses[1].ok) {
                    exchanges[index].lastHistoryError = `HTTP ${responses[1].status}: ${histRaw}`;
                    exchanges[index].history = [];
                } else {
                    exchanges[index].history = Array.isArray(histData) ? histData : [];
                    exchanges[index].lastHistoryError = exchanges[index].history.length === 0 ? "Історія ордерів та угод відсутня" : null;
                }

                if (responses.length > 2) {
                    const posRes = responses[2];
                    const posRaw = await posRes.text();
                    let posData;
                    try { posData = JSON.parse(posRaw); } catch(e) { posData = null; }
                    
                    if (!posRes.ok) {
                        exchanges[index].lastPositionsError = `HTTP ${posRes.status}: ${posRaw}`;
                        exchanges[index].positions = [];
                    } else if (posData && !Array.isArray(posData)) {
                        exchanges[index].positions = Number(posData.size) !== 0 ? [posData] : [];
                        exchanges[index].lastPositionsError = exchanges[index].positions.length === 0 ? "Позиція за цим контрактом має нульовий розмір" : null;
                    } else if (Array.isArray(posData)) {
                        exchanges[index].positions = posData.filter(p => Number(p.size) !== 0);
                        exchanges[index].lastPositionsError = exchanges[index].positions.length === 0 ? "Активні позиції відсутні" : null;
                    } else {
                        exchanges[index].positions = [];
                        exchanges[index].lastPositionsError = `Некоректний формат відповіді: ${posRaw}`;
                    }
                } else {
                    exchanges[index].positions = [];
                    exchanges[index].lastPositionsError = "Контракт не вибрано";
                }

                if (responses.length > 3) {
                    const ordRes = responses[3];
                    const ordRaw = await ordRes.text();
                    let ordData;
                    try { ordData = JSON.parse(ordRaw); } catch(e) { ordData = []; }
                    
                    if (!ordRes.ok) {
                        exchanges[index].lastOrdersError = `HTTP ${ordRes.status}: ${ordRaw}`;
                        exchanges[index].orders = [];
                    } else {
                        exchanges[index].orders = Array.isArray(ordData) ? ordData : [];
                        exchanges[index].lastOrdersError = exchanges[index].orders.length === 0 ? "Поточні ордери відсутні" : null;
                    }
                } else {
                    exchanges[index].orders = [];
                    exchanges[index].lastOrdersError = "Контракт не вибрано";
                }

                debugLog.className = "debug-box success";
                debugLog.textContent = `[УСПІХ]\nБаланс: ${exchanges[index].balance}\nПозицій: ${exchanges[index].positions.length}\nОрдерів: ${exchanges[index].orders.length}`;
                updateUI();
            } catch (err) {
                exchanges[index].balance = null;
                exchanges[index].orders = [];
                exchanges[index].positions = [];
                exchanges[index].history = [];
                exchanges[index].lastPositionsError = `Error: ${err.message}`;
                exchanges[index].lastOrdersError = `Error: ${err.message}`;
                debugLog.textContent = `[ПОМИЛКА ЗАПИТУ]\nError: ${err.message}`;
                updateUI();
            }
        }

        function cancelSingleOrder(orderId) {
            alert("Функція скасування ордера " + orderId + " в розробці");
        }

        function cancelAllOrders() {
            if (!activeEx) return;
            const exObj = exchanges.find(e => e.name === activeEx);
            if (exObj) {
                exObj.orders = [];
                updateUI();
                alert("Усі поточні ордери скасовано");
            }
        }

        function closePosition(contract) {
            alert("Закриття позиції для " + contract + " в розробці");
        }

        function openTpSlModal(contract) {
            alert("Налаштування TP/SL для " + contract + " в розробці");
        }

        function openExchangeModal() {
            editExIdx = null;
            document.getElementById('exModalTitle').textContent = "Додати біржу";
            ['exName','exUrl','exKey','exSecret'].forEach(id => document.getElementById(id).value = "");
            document.getElementById('exDelBtn').classList.add('hidden');
            document.getElementById('debugContainer').classList.add('hidden');
            document.getElementById('exchangeModal').classList.remove('hidden');
        }

        function openEditEx(i) {
            editExIdx = i;
            const ex = exchanges[i];
            document.getElementById('exModalTitle').textContent = "Налаштування " + ex.name;
            document.getElementById('exName').value = ex.name;
            document.getElementById('exUrl').value = ex.url;
            document.getElementById('exKey').value = ex.key;
            document.getElementById('exSecret').value = ex.secret;
            document.getElementById('exDelBtn').classList.remove('hidden');
            document.getElementById('debugContainer').classList.add('hidden');
            document.getElementById('exchangeModal').classList.remove('hidden');
            
            if (ex.url && ex.key && ex.secret) {
                fetchExchangeData(ex.url, ex.key, ex.secret, i);
            }
        }

        function saveExchange() {
            const name = document.getElementById('exName').value.trim();
            const url = document.getElementById('exUrl').value.trim();
            const key = document.getElementById('exKey').value.trim();
            const secret = document.getElementById('exSecret').value.trim();

            if (!name || !url) return alert("Заповніть обов'язкові поля");
            
            let existingBalance = (editExIdx !== null && exchanges[editExIdx].balance !== undefined) ? exchanges[editExIdx].balance : null;
            let existingOrders = (editExIdx !== null && exchanges[editExIdx].orders !== undefined) ? exchanges[editExIdx].orders : [];
            let existingPositions = (editExIdx !== null && exchanges[editExIdx].positions !== undefined) ? exchanges[editExIdx].positions : [];
            let existingHistory = (editExIdx !== null && exchanges[editExIdx].history !== undefined) ? exchanges[editExIdx].history : [];

            const data = { name, url, key, secret, balance: existingBalance, orders: existingOrders, positions: existingPositions, history: existingHistory };

            const targetIdx = editExIdx !== null ? editExIdx : exchanges.length;
            if (editExIdx !== null) {
                exchanges[editExIdx] = data;
            } else { 
                exchanges.push(data); 
                bots[name] = []; 
            }
            
            updateUI();

            if (url && key && secret) {
                fetchExchangeData(url, key, secret, targetIdx);
            } else {
                closeExchangeModal();
            }
        }

        function deleteExchange() {
            const name = exchanges[editExIdx].name;
            exchanges.splice(editExIdx, 1);
            delete bots[name];
            activeEx = null;
            closeExchangeModal(); updateUI();
        }

        function closeExchangeModal() { document.getElementById('exchangeModal').classList.add('hidden'); }

        function openBotModal() {
            if (!activeEx) return alert("Виберіть біржу");
            editBotIdx = null;
            document.getElementById('botModalTitle').textContent = "Новий бот";
            document.getElementById('botName').value = "";
            document.getElementById('botDelBtn').classList.add('hidden');
            document.getElementById('botModal').classList.remove('hidden');
        }

        function openEditBot(exName, i) {
            editBotIdx = i;
            activeEx = exName;
            const bot = bots[exName][i];
            document.getElementById('botModalTitle').textContent = "Налаштування бота";
            document.getElementById('botName').value = bot.name;
            document.getElementById('botStatus').value = bot.status;
            document.getElementById('botDelBtn').classList.add('hidden');
            document.getElementById('botModal').classList.remove('hidden');
        }

        function saveBot() {
            const name = document.getElementById('botName').value.trim();
            const status = document.getElementById('botStatus').value;
            if (!name) return alert("Введіть назву бота");

            if (editBotIdx !== null) {
                bots[activeEx][editBotIdx].name = name;
                bots[activeEx][editBotIdx].status = status;
            } else {
                if (!bots[activeEx]) bots[activeEx] = [];
                bots[activeEx].push({ name: name, status: status });
            }
            closeBotModal(); updateUI();
        }

        function deleteBot() {
            if (editBotIdx !== null && activeEx && bots[activeEx]) {
                bots[activeEx].splice(editBotIdx, 1);
            }
            closeBotModal(); updateUI();
        }

        function closeBotModal() { document.getElementById('botModal').classList.add('hidden'); }

        updateUI();
    </script>
</body>
</html>
