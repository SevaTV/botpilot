<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botpilot</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; padding: 15px; margin: 0; }
        
        .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h1 { color: #00ffcc; font-size: 22px; margin: 0; }
        .top-controls { display: flex; align-items: center; gap: 8px; }
        .pair-select { background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 13px; outline: none; }
        .gear-btn { cursor: pointer; font-size: 18px; opacity: 0.8; transition: 0.2s; }
        .gear-btn:hover { opacity: 1; color: #00ffcc; }

        .section { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .section-header h3 { margin: 0; font-size: 16px; color: #ccc; }
        
        .add-btn { background: #00ffcc; color: #000; border: none; width: 30px; height: 30px; font-weight: bold; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none; }
        
        .exchange-list { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .exchange-chip { background: #2a2a2a; border: 1px solid #444; padding: 8px 14px; border-radius: 6px; cursor: pointer; white-space: nowrap; font-size: 14px; display: flex; align-items: center; gap: 6px; }
        .exchange-chip.active { background: #00ffcc; color: #000; border-color: #00ffcc; font-weight: bold; }
        .settings-icon { font-size: 12px; opacity: 0.6; cursor: pointer; }

        .bot-card { background: #2a2a2a; padding: 10px 12px; border-radius: 6px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .bot-card span { font-size: 12px; color: #888; display: block; margin-top: 2px; }
        .empty-text { color: #666; font-size: 14px; text-align: center; padding: 10px; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 999; }
        .modal.hidden { display: none !important; }
        .modal-content { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; border: 1px solid #333; box-sizing: border-box; }
        .modal-content h3 { margin-top: 0; color: #00ffcc; font-size: 18px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 4px; }
        .form-group input, .form-group select { width: 100%; background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 6px; box-sizing: border-box; outline: none; }
        
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-buttons button { flex: 1; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-save { background: #00ffcc; color: #000; }
        .btn-cancel { background: #333; color: #fff; }
        .btn-delete { background: #ff5555; color: #fff; }
    </style>
</head>
<body>

    <div class="top-header">
        <h1>Botpilot</h1>
        <div class="top-controls">
            <select id="mainPairSelect" class="pair-select" onchange="setSelectedPair(this.value)">
                <option value="">Всі пари</option>
            </select>
            <span class="gear-btn" onclick="openPairConfigModal()" title="Налаштування URL пар">⚙️</span>
        </div>
    </div>

    <div class="section">
        <div class="section-header">
            <h3>Біржі</h3>
            <button class="add-btn" onclick="openExchangeModal()">+</button>
        </div>
        <div class="exchange-list" id="exchangeList"></div>
    </div>

    <div class="section">
        <div class="section-header">
            <h3>Боти <span id="exchangeLabel"></span></h3>
            <button id="botAddBtn" class="add-btn hidden" onclick="openBotModal()">+</button>
        </div>
        <div id="botList"></div>
    </div>

    <div id="pairConfigModal" class="modal hidden">
        <div class="modal-content">
            <h3>Шлях до API пар</h3>
            <div class="form-group">
                <label>Повний URL запиту або список через кому</label>
                <input type="text" id="apiFullUrlInput" placeholder="BTC_USDT, ETH_USDT, SOL_USDT">
            </div>
            <p style="font-size: 11px; color: #777; margin-bottom: 0;">Можете вказати URL або вручну перерахувати пари через кому.</p>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closePairConfigModal()">Закрити</button>
                <button class="btn-save" onclick="loadPairsFromFullURL()">Оновити</button>
            </div>
        </div>
    </div>

    <div id="exchangeModal" class="modal hidden">
        <div class="modal-content">
            <h3 id="exModalTitle">Додати біржу</h3>
            <div class="form-group">
                <label>Назва біржі</label>
                <input type="text" id="exName" placeholder="Gate">
            </div>
            <div class="form-group">
                <label>Base URL API</label>
                <input type="text" id="exUrl" placeholder="https://api.gateio.ws/api/v4">
            </div>
            <div class="form-group">
                <label>API Key</label>
                <input type="password" id="exKey">
            </div>
            <div class="form-group">
                <label>Secret Key</label>
                <input type="password" id="exSecret">
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeExchangeModal()">Скасувати</button>
                <button id="exDelBtn" class="btn-delete hidden" onclick="deleteExchange()">Видалити</button>
                <button class="btn-save" onclick="saveExchange()">Зберегти</button>
            </div>
        </div>
    </div>

    <div id="botModal" class="modal hidden">
        <div class="modal-content">
            <h3 id="botModalTitle">Новий бот</h3>
            <div class="form-group">
                <label>Назва бота</label>
                <input type="text" id="botName" placeholder="Grid Bot #1">
            </div>
            <div class="form-group">
                <label>Статус</label>
                <select id="botStatus">
                    <option value="Працює">Працює</option>
                    <option value="Зупинено">Зупинено</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeBotModal()">Скасувати</button>
                <button id="botDelBtn" class="btn-delete hidden" onclick="deleteBot()">Видалити</button>
                <button class="btn-save" onclick="saveBot()">Зберегти</button>
            </div>
        </div>
    </div>

    <script>
        let exchanges = JSON.parse(localStorage.getItem('bp_ex')) || [];
        let bots = JSON.parse(localStorage.getItem('bp_bots')) || {};
        let activeEx = null;
        let selectedPair = localStorage.getItem('bp_pair') || "";
        let savedPairsList = JSON.parse(localStorage.getItem('bp_pairs_array')) || ["BTC_USDT", "ETH_USDT", "SOL_USDT", "XRP_USDT"];
        let fullApiUrl = localStorage.getItem('bp_full_url') || "https://api.gateio.ws/api/v4/futures/usdt/contracts";
        let editExIdx = null;
        let editBotIdx = null;

        document.getElementById('apiFullUrlInput').value = fullApiUrl;

        function renderSelectOptions() {
            const select = document.getElementById('mainPairSelect');
            select.innerHTML = '<option value="">Всі пари</option>';
            savedPairsList.forEach(pairName => {
                const opt = document.createElement('option');
                opt.value = pairName;
                opt.textContent = pairName;
                if (pairName === selectedPair) opt.selected = true;
                select.appendChild(opt);
            });
        }

        function updateUI() {
            localStorage.setItem('bp_ex', JSON.stringify(exchanges));
            localStorage.setItem('bp_bots', JSON.stringify(bots));
            localStorage.setItem('bp_pair', selectedPair);
            localStorage.setItem('bp_full_url', fullApiUrl);
            localStorage.setItem('bp_pairs_array', JSON.stringify(savedPairsList));

            renderSelectOptions();

            const exList = document.getElementById('exchangeList');
            exList.innerHTML = exchanges.length ? '' : '<div class="empty-text">Немає доданих бірж</div>';
            exchanges.forEach((ex, i) => {
                const div = document.createElement('div');
                div.className = `exchange-chip ${activeEx === ex.name ? 'active' : ''}`;
                div.innerHTML = `${ex.name} <span class="settings-icon" onclick="event.stopPropagation(); openEditEx(${i})">⚙️</span>`;
                div.onclick = () => { activeEx = (activeEx === ex.name) ? null : ex.name; updateUI(); };
                exList.appendChild(div);
            });

            document.getElementById('exchangeLabel').textContent = activeEx ? `(${activeEx})` : "";
            document.getElementById('botAddBtn').classList.toggle('hidden', !activeEx);
            
            const botList = document.getElementById('botList');
            botList.innerHTML = '';
            let list = activeEx ? (bots[activeEx] || []) : [];

            if (selectedPair) {
                list = list.filter(b => b.pair === selectedPair);
            }

            if (!list.length) {
                botList.innerHTML = '<div class="empty-text">Боти відсутні</div>';
            } else {
                list.forEach((bot) => {
                    const originalIdx = bots[activeEx].indexOf(bot);
                    const card = document.createElement('div');
                    card.className = 'bot-card';
                    card.innerHTML = `
                        <div>
                            <strong>${bot.name}</strong>
                            <span>Пара: ${bot.pair || 'Ні'} | Статус: ${bot.status}</span>
                        </div>
                        <span class="gear-btn" onclick="openEditBot('${activeEx}', ${originalIdx})">⚙️</span>`;
                    botList.appendChild(card);
                });
            }
        }

        function openPairConfigModal() { document.getElementById('pairConfigModal').classList.remove('hidden'); }
        function closePairConfigModal() { document.getElementById('pairConfigModal').classList.add('hidden'); }

        async function loadPairsFromFullURL() {
            fullApiUrl = document.getElementById('apiFullUrlInput').value.trim();
            if (!fullApiUrl) return alert("Вкажіть значення");

            // Якщо користувач вписав пари через кому вручну
            if (!fullApiUrl.startsWith('http')) {
                savedPairsList = fullApiUrl.split(',').map(p => p.trim()).filter(Boolean);
                alert("Список успішно оновлено!");
                closePairConfigModal();
                updateUI();
                return;
            }

            try {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(fullApiUrl)}`;
                const res = await fetch(proxyUrl);
                const json = await res.json();
                const data = JSON.parse(json.contents);
                
                const pairs = Array.isArray(data) ? data : (data.data || []);
                if (pairs.length > 0) {
                    savedPairsList = pairs.map(p => p.name || p.id || p.symbol).filter(Boolean);
                }
                alert("Список оновлено з API!");
                closePairConfigModal();
                updateUI();
            } catch (e) {
                alert("CORS/Мережева помилка. Введіть пари через кому вручну у це поле (наприклад: BTC_USDT, ETH_USDT).");
            }
        }

        function setSelectedPair(val) { selectedPair = val; updateUI(); }

        function openExchangeModal() {
            editExIdx = null;
            document.getElementById('exModalTitle').textContent = "Додати біржу";
            ['exName','exUrl','exKey','exSecret'].forEach(id => document.getElementById(id).value = "");
            document.getElementById('exDelBtn').classList.add('hidden');
            document.getElementById('exchangeModal').classList.remove('hidden');
        }

        function openEditEx(i) {
            editExIdx = i;
            const ex = exchanges[i];
            document.getElementById('exModalTitle').textContent = "Налаштування " + ex.name;
            document.getElementById('exName').value = ex.name;
            document.getElementById('exUrl').value = ex.url;
            document.getElementById('exKey').value = ex.key;
            document.getElementById('exSecret').value = ex.secret;
            document.getElementById('exDelBtn').classList.remove('hidden');
            document.getElementById('exchangeModal').classList.remove('hidden');
        }

        function saveExchange() {
            const data = { 
                name: document.getElementById('exName').value.trim(), 
                url: document.getElementById('exUrl').value.trim(),
                key: document.getElementById('exKey').value.trim(),
                secret: document.getElementById('exSecret').value.trim()
            };
            if (!data.name || !data.url) return alert("Заповніть обов'язкові поля");
            if (editExIdx !== null) exchanges[editExIdx] = data;
            else { exchanges.push(data); bots[data.name] = []; }
            closeExchangeModal(); updateUI();
        }

        function deleteExchange() {
            const name = exchanges[editExIdx].name;
            exchanges.splice(editExIdx, 1);
            delete bots[name];
            activeEx = null;
            closeExchangeModal(); updateUI();
        }

        function closeExchangeModal() { document.getElementById('exchangeModal').classList.add('hidden'); }

        function openBotModal() {
            if (!activeEx) return alert("Виберіть біржу");
            editBotIdx = null;
            document.getElementById('botModalTitle').textContent = "Новий бот";
            document.getElementById('botName').value = "";
            document.getElementById('botDelBtn').classList.add('hidden');
            document.getElementById('botModal').classList.remove('hidden');
        }

        function openEditBot(exName, i) {
            editBotIdx = i;
            const bot = bots[exName][i];
            document.getElementById('botModalTitle').textContent = "Налаштування бота";
            document.getElementById('botName').value = bot.name;
            document.getElementById('botStatus').value = bot.status;
            document.getElementById('botDelBtn').classList.remove('hidden');
            document.getElementById('botModal').classList.remove('hidden');
        }

        function saveBot() {
            const name = document.getElementById('botName').value.trim();
            const status = document.getElementById('botStatus').value;
            if (!name) return alert("Введіть назву бота");

            const currentPair = selectedPair || savedPairsList[0] || 'BTC_USDT';
            if (editBotIdx !== null) {
                bots[activeEx][editBotIdx].name = name;
                bots[activeEx][editBotIdx].status = status;
            } else {
                bots[activeEx].push({ name: name, status: status, pair: currentPair });
            }
            closeBotModal(); updateUI();
        }

        function deleteBot() {
            bots[activeEx].splice(editBotIdx, 1);
            closeBotModal(); updateUI();
        }

        function closeBotModal() { document.getElementById('botModal').classList.add('hidden'); }

        updateUI();
    </script>
</body>
</html>
