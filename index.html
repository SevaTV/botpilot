<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botpilot</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; padding: 15px; margin: 0; }
        h1 { color: #00ffcc; font-size: 22px; margin-bottom: 15px; }
        .section { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .section-header h3 { margin: 0; font-size: 16px; color: #ccc; }
        .add-btn { background: #00ffcc; color: #000; border: none; width: 30px; height: 30px; font-weight: bold; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none; }
        
        /* Список бірж */
        .exchange-list { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .exchange-chip { background: #2a2a2a; border: 1px solid #444; padding: 8px 14px; border-radius: 6px; cursor: pointer; white-space: nowrap; font-size: 14px; display: flex; align-items: center; gap: 6px; }
        .exchange-chip.active { background: #00ffcc; color: #000; border-color: #00ffcc; font-weight: bold; }
        .settings-icon { font-size: 12px; opacity: 0.6; }

        /* Список ботів */
        .bot-card { background: #2a2a2a; padding: 10px 12px; border-radius: 6px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .bot-info span { font-size: 12px; color: #888; display: block; }
        .bot-exchange-tag { font-size: 11px; background: #333; color: #00ffcc; padding: 2px 6px; border-radius: 4px; margin-top: 4px; display: inline-block; }
        .empty-text { color: #666; font-size: 14px; text-align: center; padding: 10px; }

        /* Модальне вікно */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .modal.hidden { display: none; }
        .modal-content { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; border: 1px solid #333; box-sizing: border-box; }
        .modal-content h3 { margin-top: 0; color: #00ffcc; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 4px; }
        .form-group input, .form-group select { width: 100%; background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 6px; box-sizing: border-box; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-buttons button { flex: 1; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-save { background: #00ffcc; color: #000; }
        .btn-cancel { background: #333; color: #fff; }
        .btn-delete { background: #ff5555; color: #fff; }
    </style>
</head>
<body>
    <h1>Botpilot</h1>

    <div class="section">
        <div class="section-header">
            <h3>Біржі</h3>
            <button class="add-btn" onclick="openExchangeModal()">+</button>
        </div>
        <div class="exchange-list" id="exchangeList">
            </div>
    </div>

    <div class="section">
        <div class="section-header">
            <h3>Боти <span id="selectedExchangeTitle"></span></h3>
            <button id="botAddBtn" class="add-btn hidden" onclick="openBotModal()">+</button>
        </div>
        <div id="botList">
            </div>
    </div>

    <div id="exchangeModal" class="modal hidden">
        <div class="modal-content">
            <h3 id="exchangeModalTitle">Додати біржу</h3>
            <div class="form-group">
                <label>Назва біржі</label>
                <input type="text" id="exNameInput" placeholder="Наприклад: Gate">
            </div>
            <div class="form-group">
                <label>Base URL API</label>
                <input type="text" id="exApiUrl" placeholder="Наприклад: https://api.gateio.ws/api/v4">
            </div>
            <div class="form-group">
                <label>API Key</label>
                <input type="password" id="exApiKey" placeholder="Введіть API ключ">
            </div>
            <div class="form-group">
                <label>Secret Key</label>
                <input type="password" id="exSecretKey" placeholder="Введіть секретний ключ">
            </div>
            <div class="form-group">
                <label>Режим роботи</label>
                <select id="exMode">
                    <option value="spot">Спотова торгівля</option>
                    <option value="futures">Ф'ючерси</option>
                    <option value="testnet">Testnet (Тестовий)</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeExchangeModal()">Скасувати</button>
                <button id="deleteExBtn" class="btn-delete hidden" onclick="deleteExchange()">Видалити</button>
                <button class="btn-save" onclick="saveExchange()">Зберегти</button>
            </div>
        </div>
    </div>

    <div id="botModal" class="modal hidden">
        <div class="modal-content">
            <h3>Створити бота</h3>
            <div class="form-group">
                <label>Назва бота</label>
                <input type="text" id="botNameInput" placeholder="Наприклад: Grid Bot #1">
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeBotModal()">Скасувати</button>
                <button class="btn-save" onclick="saveBot()">Створити</button>
            </div>
        </div>
    </div>

    <script>
        let exchanges = JSON.parse(localStorage.getItem('botpilot_exchanges')) || [];
        let bots = JSON.parse(localStorage.getItem('botpilot_bots')) || {};

        let selectedExchange = null;
        let editingExchangeName = null;

        function saveData() {
            localStorage.setItem('botpilot_exchanges', JSON.stringify(exchanges));
            localStorage.setItem('botpilot_bots', JSON.stringify(bots));
        }

        function renderExchanges() {
            const list = document.getElementById('exchangeList');
            list.innerHTML = '';
            
            if (exchanges.length === 0) {
                list.innerHTML = '<div class="empty-text">Немає доданих бірж</div>';
                return;
            }

            exchanges.forEach(ex => {
                const chip = document.createElement('div');
                chip.className = `exchange-chip ${selectedExchange === ex.name ? 'active' : ''}`;
                chip.innerHTML = `<span>${ex.name}</span> <span class="settings-icon" onclick="event.stopPropagation(); editExchange('${ex.name}')">⚙️</span>`;
                chip.onclick = () => toggleExchangeSelection(ex.name);
                list.appendChild(chip);
            });
        }

        function toggleExchangeSelection(exName) {
            if (selectedExchange === exName) {
                selectedExchange = null;
                document.getElementById('selectedExchangeTitle').textContent = '';
                document.getElementById('botAddBtn').classList.add('hidden');
            } else {
                selectedExchange = exName;
                document.getElementById('selectedExchangeTitle').textContent = `(${exName})`;
                document.getElementById('botAddBtn').classList.remove('hidden');
            }
            renderExchanges();
            renderBots();
        }

        function renderBots() {
            const list = document.getElementById('botList');
            list.innerHTML = '';
            
            let targetBots = [];

            if (selectedExchange) {
                targetBots = (bots[selectedExchange] || []).map(b => ({...b, exchange: selectedExchange}));
            } else {
                for (let ex in bots) {
                    (bots[ex] || []).forEach(b => {
                        targetBots.push({...b, exchange: ex});
                    });
                }
            }

            if (targetBots.length === 0) {
                list.innerHTML = '<div class="empty-text">Немає ботів</div>';
                return;
            }

            targetBots.forEach(bot => {
                const card = document.createElement('div');
                card.className = 'bot-card';
                card.innerHTML = `
                    <div>
                        <strong>${bot.name}</strong>
                        <span>Статус: ${bot.status}</span>
                        ${!selectedExchange ? `<span class="bot-exchange-tag">${bot.exchange}</span>` : ''}
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function openExchangeModal() {
            editingExchangeName = null;
            document.getElementById('exchangeModalTitle').textContent = 'Додати біржу';
            document.getElementById('exNameInput').value = '';
            document.getElementById('exNameInput').disabled = false;
            document.getElementById('exApiUrl').value = '';
            document.getElementById('exApiKey').value = '';
            document.getElementById('exSecretKey').value = '';
            document.getElementById('exMode').value = 'spot';
            document.getElementById('deleteExBtn').classList.add('hidden');
            document.getElementById('exchangeModal').classList.remove('hidden');
        }

        function editExchange(exName) {
            editingExchangeName = exName;
            const exData = exchanges.find(e => e.name === exName);
            if (!exData) return;

            document.getElementById('exchangeModalTitle').textContent = 'Налаштування біржі';
            document.getElementById('exNameInput').value = exData.name;
            document.getElementById('exNameInput').disabled = true;
            document.getElementById('exApiUrl').value = exData.apiUrl || '';
            document.getElementById('exApiKey').value = exData.apiKey || '';
            document.getElementById('exSecretKey').value = exData.secretKey || '';
            document.getElementById('exMode').value = exData.mode || 'spot';
            document.getElementById('deleteExBtn').classList.remove('hidden');
            document.getElementById('exchangeModal').classList.remove('hidden');
        }

        function closeExchangeModal() {
            document.getElementById('exchangeModal').classList.add('hidden');
        }

        function saveExchange() {
            const name = document.getElementById('exNameInput').value.trim();
            const apiUrl = document.getElementById('exApiUrl').value.trim();
            const apiKey = document.getElementById('exApiKey').value.trim();
            const secretKey = document.getElementById('exSecretKey').value.trim();
            const mode = document.getElementById('exMode').value;

            if (!name) return alert('Введіть назву біржі');
            if (!apiUrl) return alert('Введіть Base URL API');

            if (editingExchangeName) {
                let ex = exchanges.find(e => e.name === editingExchangeName);
                if (ex) {
                    ex.apiUrl = apiUrl;
                    ex.apiKey = apiKey;
                    ex.secretKey = secretKey;
                    ex.mode = mode;
                }
            } else {
                if (exchanges.some(e => e.name === name)) {
                    return alert('Така біржа вже існує');
                }
                exchanges.push({ name, apiUrl, apiKey, secretKey, mode });
                if (!bots[name]) bots[name] = [];
            }

            saveData();
            closeExchangeModal();
            renderExchanges();
            renderBots();
        }

        function deleteExchange() {
            if (!editingExchangeName) return;
            if (confirm(`Видалити біржу ${editingExchangeName} та всі її боти?`)) {
                exchanges = exchanges.filter(e => e.name !== editingExchangeName);
                delete bots[editingExchangeName];
                if (selectedExchange === editingExchangeName) {
                    selectedExchange = null;
                    document.getElementById('selectedExchangeTitle').textContent = '';
                    document.getElementById('botAddBtn').classList.add('hidden');
                }
                saveData();
                closeExchangeModal();
                renderExchanges();
                renderBots();
            }
        }

        function openBotModal() {
            if (!selectedExchange) return;
            document.getElementById('botNameInput').value = '';
            document.getElementById('botModal').classList.remove('hidden');
        }

        function closeBotModal() {
            document.getElementById('botModal').classList.add('hidden');
        }

        function saveBot() {
            const name = document.getElementById('botNameInput').value.trim();
            if (name && selectedExchange) {
                if (!bots[selectedExchange]) bots[selectedExchange] = [];
                bots[selectedExchange].push({name: name, status: 'Зупинено'});
                saveData();
                closeBotModal();
                renderBots();
            } else {
                alert('Введіть назву бота');
            }
        }

        renderExchanges();
        renderBots();
    </script>
</body>
</html>
